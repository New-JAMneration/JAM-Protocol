name: Test Docker Build

on:
  pull_request:
    paths:
      - 'docker/Dockerfile'
      - '.dockerignore'
      - '.gitignore'
      - 'scripts/release.sh'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/test-docker-build.yml'

permissions:
  contents: read

jobs:
  docker-build-linux:
    runs-on: ubuntu-latest
    name: Docker Build (Linux)
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN }}

      - name: Set git credentials for submodules
        run: git config --global url."https://${{ secrets.TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Init submodule (Rust-VRF only)
        run: git submodule update --init pkg/Rust-VRF

      - name: Show environment info
        run: |
          echo "=== OS ==="
          uname -a
          echo "=== Docker ==="
          docker version
          echo "=== BuildKit ==="
          docker buildx version
          echo "=== Git ==="
          git --version
          echo "=== Submodule .git pointer ==="
          file pkg/Rust-VRF/.git
          cat pkg/Rust-VRF/.git

      - name: Test standard docker build
        run: >
          docker build
          --build-arg GP_VERSION=0.7.2
          --build-arg TARGET_VERSION=0.1.0
          --build-arg OUTPUT=new-jamneration-target
          -t new-jamneration-target:test
          -f docker/Dockerfile .

      - name: Verify image
        run: docker run --rm new-jamneration-target:test --version

      - name: Test release script
        run: bash scripts/release.sh 0.7.2 0.1.0
